name: GitHub Actions Runner in Docker - Latest
on:
  push:
    paths-ignore:
      - Dockerfile.base
      - README.md
    branches:
      - master
      - develop
  schedule:
    - cron:  '59 23 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ubuntu_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        release: [jammy, focal, noble]
        platform: [amd64, arm64]
      fail-fast: false
    steps:
      - name: Copy Repo Files
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Get GitHub organization or user
        run: echo 'ORG='$(echo $(dirname ${GITHUB_REPOSITORY}) | awk '{print tolower($0)}') >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Copy Dockerfile
        run: cp Dockerfile Dockerfile.ubuntu-${{ matrix.release }}; sed -i.bak "s/FROM.*/FROM ${ORG}\/github-runner-base:ubuntu-${{ matrix.release }}/" Dockerfile.ubuntu-${{ matrix.release }}
      - name: Install Goss and dgoss
        run: |
          set -euo pipefail

          VERSION="v0.4.9"
          BIN_DIR="$HOME/.local/bin"

          mkdir -p "$BIN_DIR"
          echo "$BIN_DIR" >> "$GITHUB_PATH"

          ARCH="${{ matrix.platform }}"
          if [ "$ARCH" != "amd64" ] && [ "$ARCH" != "arm64" ]; then
            echo "Unsupported platform: $ARCH"
            exit 1
          fi

          curl -fsSL \
            -o "$BIN_DIR/goss" \
            "https://github.com/goss-org/goss/releases/download/${VERSION}/goss-linux-${ARCH}"

          curl -fsSL \
            -o "$BIN_DIR/dgoss" \
            "https://github.com/goss-org/goss/releases/download/${VERSION}/dgoss"

          chmod +x "$BIN_DIR/goss" "$BIN_DIR/dgoss"

          "$BIN_DIR/goss" --version
      - name: Get current Git SHA
        id: vars
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: set testable image environment variable
        id: testvars
        run: echo "GH_RUNNER_IMAGE=ubuntu-${{ matrix.release }}-${{ env.GIT_SHA }}-${{ matrix.platform }}" >> $GITHUB_ENV
      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Retry build and load
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            docker buildx build \
              --file Dockerfile.ubuntu-${{ matrix.release }} \
              --platform linux/${{ matrix.platform }} \
              --tag ${{ env.GH_RUNNER_IMAGE }} \
              --load \
              --pull \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .
      # Tests will run against the final `${GH_RUNNER_IMAGE}` laid on top of `base-${GH_RUNNER_IMAGE}`
      - name: Run goss tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            echo "os: ubuntu" >goss_vars_${GH_RUNNER_IMAGE}.yaml
            echo "oscodename: ${{ matrix.release }}" >>goss_vars_${GH_RUNNER_IMAGE}.yaml
            echo "arch: ${{ matrix.platform }}" >>goss_vars_${GH_RUNNER_IMAGE}.yaml
            # test the edge case from deregistration on reusable runners
            GOSS_VARS=goss_vars_${GH_RUNNER_IMAGE}.yaml GOSS_FILE=goss_reusage_fail.yaml GOSS_SLEEP=1 $HOME/.local/bin/dgoss run --entrypoint /usr/bin/sleep \
            -e DEBUG_ONLY=true \
            -e ACCESS_TOKEN=notreal \
            -e LABELS=linux,x64 \
            -e REPO_URL=https://github.com/octokode/test1 \
            -e RUNNER_NAME=sustainjane-runner-1 \
            -e RUNNER_SCOPE=repo \
            -e RUNNER_WORKDIR=/tmp/runner/work \
            -e DISABLE_AUTOMATIC_DEREGISTRATION=false \
            -e CONFIGURED_ACTIONS_RUNNER_FILES_DIR=/runner/data \
            ${GH_RUNNER_IMAGE} 10
            if [ $? -ne 0 ]; then
              exit 1
            fi
            # test the base
            GOSS_VARS=goss_vars_${GH_RUNNER_IMAGE}.yaml GOSS_FILE=goss_base.yaml GOSS_SLEEP=1 $HOME/.local/bin/dgoss run --entrypoint /usr/bin/sleep -e RUNNER_NAME=test -e DEBUG_ONLY=true ${GH_RUNNER_IMAGE} 10
            if [ $? -ne 0 ]; then
              exit 1
            fi
            # test the final image but with all defaults
            GOSS_VARS=goss_vars_${GH_RUNNER_IMAGE}.yaml GOSS_FILE=goss_full_defaults.yaml GOSS_SLEEP=1 $HOME/.local/bin/dgoss run --entrypoint /usr/bin/sleep -e RUNNER_NAME=test -e DEBUG_ONLY=true ${GH_RUNNER_IMAGE} 10
            if [ $? -ne 0 ]; then
              exit 1
            fi
            # test the final image but with non-default values
            GOSS_VARS=goss_vars_${GH_RUNNER_IMAGE}.yaml GOSS_FILE=goss_full.yaml GOSS_SLEEP=1 $HOME/.local/bin/dgoss run --entrypoint /usr/bin/sleep \
            -e DEBUG_ONLY=true \
            -e RUNNER_NAME=huzzah \
            -e REPO_URL=https://github.com/myoung34/docker-github-actions-runner \
            -e RUN_AS_ROOT=true \
            -e RUNNER_NAME_PREFIX=asdf \
            -e ACCESS_TOKEN=1234 \
            -e APP_ID=5678 \
            -e APP_PRIVATE_KEY=2345 \
            -e APP_LOGIN=SOMETHING \
            -e RUNNER_SCOPE=org \
            -e ORG_NAME=myoung34 \
            -e ENTERPRISE_NAME=emyoung34 \
            -e LABELS=blue,green \
            -e RUNNER_TOKEN=3456 \
            -e RUNNER_WORKDIR=/tmp/a \
            -e RUNNER_GROUP=wat \
            -e GITHUB_HOST=github.example.com \
            -e DISABLE_AUTOMATIC_DEREGISTRATION=true \
            -e EPHEMERAL=true \
            -e DISABLE_AUTO_UPDATE=true \
            ${GH_RUNNER_IMAGE} 10
            if [ $? -ne 0 ]; then
              exit 1
            fi

